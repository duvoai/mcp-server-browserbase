substitutions:
  _BROWSERBASE_PROJECT_ID: ''
  _GEMINI_API_KEY: ''
  _BROWSERBASE_API_KEY: ''

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'europe-west1-docker.pkg.dev/taskcrew-452921/mcp-server-browserbase/mcp-server-browserbase:latest',
      '.'
    ]

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/taskcrew-452921/mcp-server-browserbase/mcp-server-browserbase:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'mcp-server-browserbase',
      '--image', 'europe-west1-docker.pkg.dev/taskcrew-452921/mcp-server-browserbase/mcp-server-browserbase:latest',
      '--platform', 'managed',
      '--region', 'europe-west1',
      '--allow-unauthenticated',
      '--port', '3000',
      '--memory', '1Gi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--timeout', '300',
      '--set-env-vars', 'NODE_ENV=production,BROWSERBASE_PROJECT_ID=${_BROWSERBASE_PROJECT_ID},GEMINI_API_KEY=${_GEMINI_API_KEY},BROWSERBASE_API_KEY=${_BROWSERBASE_API_KEY}',
      '--execution-environment', 'gen2'
    ]

images:
  - 'europe-west1-docker.pkg.dev/taskcrew-452921/mcp-server-browserbase/mcp-server-browserbase:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY